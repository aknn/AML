# AML Configuration File
# Adjust these parameters to customize the fraud detection system

# Data Generation Settings
data:
  n_samples: 10000           # Number of synthetic transactions to generate
  fraud_rate_target: 0.05    # Target fraud rate (5%)
  random_seed: 42           # For reproducibility

# Model Parameters  
model:
  algorithm: "gradient_boosting"
  n_estimators: 100         # Number of boosting stages
  learning_rate: 0.1        # Learning rate shrinks contribution of each tree
  max_depth: 6              # Maximum depth of individual regression estimators
  min_samples_split: 20     # Minimum samples required to split an internal node
  min_samples_leaf: 10      # Minimum samples required to be at a leaf node
  subsample: 0.8           # Fraction of samples for fitting individual learners
  
# Training Settings
training:
  test_size: 0.2           # Fraction of data for testing (20%)
  stratify: true           # Maintain class distribution in train/test split
  
# Fraud Detection Rules (for synthetic data generation)
fraud_rules:
  high_amount_threshold: 5000     # Amount above which transactions are suspicious
  high_amount_score: 0.3          # Suspicion score for high amounts
  quick_transaction_hours: 0.5    # Hours threshold for rapid transactions  
  quick_transaction_score: 0.4    # Suspicion score for quick transactions
  foreign_transaction_score: 0.2  # Suspicion score for foreign transactions
  device_mismatch_score: 0.5      # Suspicion score for device mismatch
  new_account_days: 90           # Days threshold for "new" accounts
  new_account_amount: 1000       # Amount threshold for new account suspicion
  new_account_score: 0.3         # Suspicion score for new account + high amount
  fraud_threshold: 0.5           # Final threshold to classify as fraud

# Output Settings
output:
  save_dataset: true        # Save generated dataset to CSV
  save_model: true          # Save trained model (future feature)
  save_plots: true          # Save visualization plots
  dataset_filename: "synthetic_transactions.csv"
  model_filename: "fraud_detection_model.pkl"
  feature_importance_plot: "feature_importance.png"
  
# Evaluation Settings
evaluation:
  print_detailed_report: true     # Show detailed classification report
  show_confusion_matrix: true     # Display confusion matrix
  plot_feature_importance: true   # Generate feature importance plot
  top_features_to_show: 10       # Number of top features to display